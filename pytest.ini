[pytest]
# ---------------------------------------------------------------------------
# Test discovery
# ---------------------------------------------------------------------------
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ---------------------------------------------------------------------------
# Output & verbosity
# ---------------------------------------------------------------------------
addopts =
    -v
    --tb=short
    --strict-markers
    --html=reports/report.html
    --self-contained-html

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s — %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
log_file = reports/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)s] %(name)s — %(message)s

# ---------------------------------------------------------------------------
# Custom markers
# ---------------------------------------------------------------------------
markers =
    smoke: Quick sanity-check tests (run on every commit)
    regression: Full regression suite
    e2e: End-to-end browser tests
    careers: Tests related to the Careers page
    homepage: Tests related to the Homepage

# ---------------------------------------------------------------------------
# Timeout (requires pytest-timeout)
# ---------------------------------------------------------------------------
timeout = 120
